<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli - WishLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { padding: 30px; text-align: center; border-radius: 16px; }
        .stat-card h3 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .stat-card p { color: var(--text-muted); font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 16px; overflow: hidden; }
        th, td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        th { background: rgba(0,0,0,0.2); font-weight: 600; }
        .badge-admin { background: var(--secondary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body class="dashboard-page dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar glass">
        <div class="logo"><a href="index.html">Wish<span>Link</span></a></div>
        <div class="user-profile">
            <span class="badge-admin" style="margin-right:10px;">YÖNETİCİ</span>
            <span id="welcomeUser">Admin</span>
            <a href="dashboard.html" class="btn btn-sm btn-outline" style="margin-left: 10px;">Geri Dön</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h2>Sistem İstatistikleri</h2>
                <p class="text-muted">WishLink platformunun genel durumu ve üye yönetimi.</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card glass">
                <h3 id="statUsers">0</h3>
                <p>Toplam Kullanıcı</p>
            </div>
            <div class="stat-card glass">
                <h3 id="statLists">0</h3>
                <p>Oluşturulan Liste</p>
            </div>
            <div class="stat-card glass">
                <h3 id="statProducts">0</h3>
                <p>Eklenen Ürün</p>
            </div>
        </section>

        <section>
            <h3 style="font-size: 1.5rem; margin-bottom: 20px;">Üye Yönetimi</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kullanıcı Adı</th>
                        <th>Rol</th>
                        <th>Liste Sayısı</th>
                        <th>Kayıt Tarihi</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" style="text-align: center;">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
